name: Deploy Preview

on:
  workflow_call:
    inputs:
      preview_id:
        required: true
        type: string
        description: "Preview ID (e.g., feature-xyz)"

permissions:
  id-token: write
  contents: read

jobs:
  deploy-preview:
    name: Deploy Preview Environment
    environment: preview
    concurrency:
      group: preview-deploy-${{ inputs.preview_id }}
      cancel-in-progress: false
    env:
      ENVIRONMENT: preview
      CDK_DEPLOY_ACCOUNT: ${{ vars.ACCOUNT_ID }}
      CDK_DEPLOY_REGION: ${{ vars.REGION }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1
        with:
          enable-cache: true
          working-directory: cdk

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActionsCDKDeploymentRole-${{ vars.REGION }}-${{ vars.ACCOUNT_ID }}
          role-session-name: cdk-preview-${{ inputs.preview_id }}
          aws-region: ${{ vars.REGION }}

      # -------------------------
      # Build React Frontend
      # -------------------------
      - name: Build React Website
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # -------------------------
      # Install CDK Dependencies
      # -------------------------
      - name: Install Root Node Dependencies
        run: npm ci

      - name: Install CDK Dependencies
        working-directory: cdk
        run: |
          uv sync --locked --no-dev

      - name: Show CDK Version
        run: npx cdk --version

      # -------------------------
      # CDK Synth with Preview Contexts
      # -------------------------
      - name: CDK Synth
        working-directory: cdk
        run: |
          npx cdk synth \
            --app "uv run --no-sync --no-dev python app.py" \
            --context environment=preview \
            --context stack_scope=website-only \
            --context preview_id=${{ inputs.preview_id }}

      # -------------------------
      # CDK Deploy
      # -------------------------
      - name: Deploy CDK Preview Stack
        working-directory: cdk
        run: |
          npx cdk deploy \
            --app 'cdk.out/' \
            --all \
            --require-approval never \
            --context environment=preview \
            --context stack_scope=website-only \
            --context preview_id=${{ inputs.preview_id }}

      # -------------------------
      # Output Preview URL
      # -------------------------
      - name: Output Preview URL
        run: |
          echo "✅ Preview environment deployed!"
          echo "**URL:** https://${{ inputs.preview_id }}.develop.cullancarey.com"
          echo "*This preview will be automatically destroyed when the PR is merged to develop.*"

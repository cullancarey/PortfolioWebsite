name: Deploy Preview

on:
  workflow_call:
    inputs:
      preview_id:
        required: true
        type: string
        description: "Preview ID (e.g., feature-xyz)"

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  deploy-preview:
    name: Deploy Preview Environment
    environment: preview
    concurrency:
      group: preview-deploy-${{ inputs.preview_id }}
      cancel-in-progress: false
    env:
      ENVIRONMENT: preview
      CDK_DEPLOY_ACCOUNT: ${{ vars.ACCOUNT_ID }}
      CDK_DEPLOY_REGION: ${{ vars.REGION }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          working-directory: cdk

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActionsCDKDeploymentRole-${{ vars.REGION }}-${{ vars.ACCOUNT_ID }}
          role-session-name: cdk-preview-${{ vars.REGION }}-${{ vars.ACCOUNT_ID }}
          aws-region: ${{ vars.REGION }}

      # -------------------------
      # Build React Frontend
      # -------------------------
      - name: Build React Website
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # -------------------------
      # Install CDK Dependencies
      # -------------------------
      - name: Install Root Node Dependencies
        run: npm ci

      - name: Install CDK Dependencies
        working-directory: cdk
        run: |
          uv sync --locked --no-dev

      - name: Show CDK Version
        run: npx cdk --version

      - name: Normalize Preview ID
        run: |
          normalized_preview_id=$(echo "${{ inputs.preview_id }}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g; s/^(.{1,40}).*$/\1/; s/-+$//')
          echo "NORMALIZED_PREVIEW_ID=$normalized_preview_id" >> "$GITHUB_ENV"

      # -------------------------
      # CDK Synth Shared Preview Infra
      # -------------------------
      - name: CDK Synth Shared Preview Infra
        working-directory: cdk
        run: |
          npx cdk synth \
            --app "uv run --no-sync --no-dev python app.py" \
            --context environment=preview \
            --context stack_scope=shared-infra \
            --context preview_id="${{ env.NORMALIZED_PREVIEW_ID }}"

      - name: Deploy Shared Preview Infra
        working-directory: cdk
        run: |
          npx cdk deploy \
            --app 'cdk.out/' \
            --all \
            --require-approval never \
            --context environment=preview \
            --context stack_scope=shared-infra \
            --context preview_id="${{ env.NORMALIZED_PREVIEW_ID }}"

      - name: Wait for Preview SSM Parameters
        run: |
          parameters=(
            "/Preview/${{ env.NORMALIZED_PREVIEW_ID }}/WebsiteCertificateArn"
            "/Preview/${{ env.NORMALIZED_PREVIEW_ID }}/BackupWebsiteBucketArn"
            "/Preview/${{ env.NORMALIZED_PREVIEW_ID }}/BackupWebsiteBucketName"
          )

          deadline=$((SECONDS + 300))
          while [ "$SECONDS" -lt "$deadline" ]; do
            set +e
            missing=$(aws ssm get-parameters \
              --region "${{ vars.REGION }}" \
              --names "${parameters[@]}" \
              --query 'InvalidParameters' \
              --output text 2>&1)
            exit_code=$?
            set -e

            if [ "$exit_code" -ne 0 ]; then
              echo "Failed to query SSM parameters in ${{ vars.REGION }}"
              echo "$missing"
              exit 1
            fi

            if [ -z "$missing" ] || [ "$missing" = "None" ]; then
              echo "Preview parameters are available in ${{ vars.REGION }}"
              exit 0
            fi

            echo "Still waiting on parameters: $missing"
            echo "Waiting for preview SSM parameters to replicate to ${{ vars.REGION }}..."
            sleep 10
          done

          echo "Timed out waiting for preview SSM parameters in ${{ vars.REGION }}"
          exit 1

      # -------------------------
      # CDK Synth Branch Preview Stack
      # -------------------------
      - name: CDK Synth Preview Website Stack
        working-directory: cdk
        run: |
          npx cdk synth \
            --app "uv run --no-sync --no-dev python app.py" \
            --context environment=preview \
            --context stack_scope=website-only \
            --context preview_id="${{ env.NORMALIZED_PREVIEW_ID }}" \
            > /dev/null
          echo "Website preview stack synthesized"

      # -------------------------
      # CDK Deploy Branch Preview Stack
      # -------------------------
      - name: Deploy CDK Preview Stack
        working-directory: cdk
        run: |
          npx cdk deploy \
            --app 'cdk.out/' \
            --all \
            --require-approval never \
            --context environment=preview \
            --context stack_scope=website-only \
            --context preview_id="${{ env.NORMALIZED_PREVIEW_ID }}"

      # -------------------------
      # Output Preview URL
      # -------------------------
      - name: Output Preview URL
        run: |
          echo "✅ Preview environment deployed!"
          echo "**URL:** https://${NORMALIZED_PREVIEW_ID}.develop.cullancarey.com"
          echo "*This preview will be automatically destroyed when the PR is merged to develop.*"

      # -------------------------
      # Comment Preview Status on PR
      # -------------------------
      - name: Comment Preview Status on PR
        uses: actions/github-script@v9
        if: always()
        env:
          NORMALIZED_PREVIEW_ID: ${{ env.NORMALIZED_PREVIEW_ID }}
        with:
          script: |
            const marker = '<!-- preview-deploy-status -->';
            const branch = context.ref.replace('refs/heads/', '');
            const previewUrl = `https://${process.env.NORMALIZED_PREVIEW_ID}.develop.cullancarey.com`;
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const body = `${marker}\n${emoji} Preview deploy ${status} for branch \`${branch}\`.\n\nURL: ${previewUrl}`;

            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              per_page: 1,
            });

            if (!pulls.length) {
              core.info(`No open PR found for branch ${branch}; skipping PR comment.`);
              return;
            }

            const issue_number = pulls[0].number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated preview deploy status comment on PR #${issue_number}.`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });
            core.info(`Created preview deploy status comment on PR #${issue_number}.`);

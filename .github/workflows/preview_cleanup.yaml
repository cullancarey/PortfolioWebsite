name: Cleanup Preview

on:
  workflow_call:
    inputs:
      preview_id:
        required: true
        type: string
        description: "Preview ID (e.g., feature-xyz)"

permissions:
  id-token: write
  contents: read

jobs:
  cleanup-preview:
    name: Cleanup Preview Environment
    environment: preview
    concurrency:
      group: preview-cleanup-${{ inputs.preview_id }}
      cancel-in-progress: false
    env:
      ENVIRONMENT: preview
      CDK_DEPLOY_ACCOUNT: ${{ vars.ACCOUNT_ID }}
      CDK_DEPLOY_REGION: ${{ vars.REGION }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          working-directory: cdk

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActionsCDKDeploymentRole-${{ vars.REGION }}-${{ vars.ACCOUNT_ID }}
          role-session-name: cdk-preview-cleanup-${{ vars.REGION }}-${{ vars.ACCOUNT_ID }}
          aws-region: ${{ vars.REGION }}

      # -------------------------
      # Install CDK Dependencies
      # -------------------------
      - name: Install Root Node Dependencies
        run: npm ci

      - name: Install CDK Dependencies
        working-directory: cdk
        run: |
          uv sync --locked --no-dev

      - name: Show CDK Version
        run: npx cdk --version

      - name: Normalize Preview ID
        run: |
          normalized_preview_id=$(echo "${{ inputs.preview_id }}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g; s/^(.{1,40}).*$/\1/')
          echo "NORMALIZED_PREVIEW_ID=$normalized_preview_id" >> "$GITHUB_ENV"

      # -------------------------
      # CDK Synth with Preview Contexts
      # -------------------------
      - name: CDK Synth Shared Preview Infra
        working-directory: cdk
        run: |
          npx cdk synth \
            --app "uv run --no-sync --no-dev python app.py" \
            --context environment=preview \
            --context stack_scope=shared-infra \
            --context preview_id="${{ env.NORMALIZED_PREVIEW_ID }}"

      - name: CDK Synth Preview Website Stack
        working-directory: cdk
        run: |
          npx cdk synth \
            --app "uv run --no-sync --no-dev python app.py" \
            --context environment=preview \
            --context stack_scope=website-only \
            --context preview_id="${{ env.NORMALIZED_PREVIEW_ID }}"

      # -------------------------
      # CDK Destroy
      # -------------------------
      - name: Destroy Preview Website Stack
        working-directory: cdk
        run: |
          npx cdk destroy \
            --app 'cdk.out/' \
            --all \
            --force \
            --context environment=preview \
            --context stack_scope=website-only \
            --context preview_id="${{ env.NORMALIZED_PREVIEW_ID }}"

      - name: Destroy Shared Preview Infra
        working-directory: cdk
        run: |
          npx cdk destroy \
            --app 'cdk.out/' \
            --all \
            --force \
            --context environment=preview \
            --context stack_scope=shared-infra \
            --context preview_id="${{ env.NORMALIZED_PREVIEW_ID }}"

      # -------------------------
      # Comment Cleanup on PR
      # -------------------------
      - name: Comment Cleanup Status on PR
        uses: actions/github-script@v9
        if: always()
        with:
          script: |
            const previewId = "${{ inputs.preview_id }}";
            const status = "${{ job.status }}";
            const emoji = status === "success" ? "✅" : "❌";
            const comment = `${emoji} Preview environment cleaned up (${status}).`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment,
            });

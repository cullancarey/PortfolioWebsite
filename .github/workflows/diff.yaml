name: Diff

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "The github environment to diff against."

permissions:
  id-token: write
  contents: read

jobs:
  diff:
    name: Diff to ${{ inputs.environment }}
    environment: ${{ inputs.environment }}
    concurrency:
      group: diff-${{ inputs.environment }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      ENVIRONMENT: ${{ vars.ENVIRONMENT }}
      CDK_DEPLOY_ACCOUNT: ${{ vars.ACCOUNT_ID }}
      CDK_DEPLOY_REGION: ${{ vars.REGION }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          working-directory: cdk

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActionsCDKDeploymentRole-${{ vars.REGION }}-${{ vars.ACCOUNT_ID }}
          role-session-name: cdk-deployment-${{ vars.REGION }}-${{ vars.ACCOUNT_ID }}
          aws-region: ${{ vars.REGION }}

      # -------------------------
      # Install CDK Dependencies
      # -------------------------
      - name: Install Root Node Dependencies
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Install CDK Dependencies
        working-directory: cdk
        run: |
          uv sync --locked --no-dev

      - name: Show CDK Version
        run: npx cdk --version

      # -------------------------
      # CDK Synth
      # -------------------------
      - name: CDK Synth
        working-directory: cdk
        run: |
          npx cdk synth --app "uv run --no-sync --no-dev python app.py" --context environment=${{ inputs.environment }}

      # -------------------------
      # CDK Diff
      # -------------------------
      - name: Diff CDK Stacks
        working-directory: cdk
        run: |
          npx cdk diff --app 'cdk.out/' --context environment=${{ inputs.environment }}